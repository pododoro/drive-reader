name: QA

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  workflow-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Start web app
        run: |
          npm run web > web.log 2>&1 &
          echo $! > web.pid
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8081 >/dev/null || curl -fsS http://127.0.0.1:19006 >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Web app did not become ready in time"
          cat web.log
          exit 1

      - name: Run workflow QA
        env:
          QA_URL: http://127.0.0.1:8081
        run: npm run qa:workflow

      - name: Stop web app
        if: always()
        run: |
          if [ -f web.pid ]; then
            kill "$(cat web.pid)" || true
          fi
